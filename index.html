<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Opening Coin DCX  Test...</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0a0a0a;color:#fff;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:20px;padding:24px;text-align:center}
    .ring{width:44px;height:44px;border:2px solid rgba(255,255,255,0.1);
      border-top-color:#fff;border-radius:50%;
      animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-size:18px;font-weight:500}
    p{font-size:13px;color:rgba(255,255,255,0.4)}
    a{color:rgba(255,255,255,0.35);font-size:13px;margin-top:8px;display:block}
  </style>
</head>
<body>
  <div class="ring"></div>
  <h2>Opening The Salad Studio</h2>
  <p id="msg">Detecting your device...</p>
  <a id="link" href="https://play.google.com/store/apps/details?id=host.exp.exponent">Tap here if not redirected</a>
  <script>
    var AND="https://play.google.com/store/apps/details?id=host.exp.exponent",IOS="https://apps.apple.com/us/app/expo-go/id982107779",WEB="";
    var ua=navigator.userAgent||"";
    var dest;
    if(/android/i.test(ua)){dest=AND||WEB;document.getElementById("msg").textContent="Opening Play Store...";}
    else if(/iPad|iPhone|iPod/.test(ua)&&!window.MSStream){dest=IOS||WEB;document.getElementById("msg").textContent="Opening App Store...";}
    else{dest=WEB||IOS||AND;document.getElementById("msg").textContent="Opening website...";}
    document.getElementById("link").href=dest;
    setTimeout(function(){if(dest)window.location.href=dest;},350);
  </script>
</body>
</html>
